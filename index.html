<style>

padding:0;

body{

.login-container{

.login-form{

.login-btn{

.health-status{

.health-label{

.health-description{

.stats-summary{

</head>
<body>

<script>
const members = [
{ fullName:"Dayag, Arwil", defaultStatus:"Present" },
{ fullName:"Gacia, Aira", defaultStatus:"Present" },
{ fullName:"Fernandez, Rhian", defaultStatus:"Present" },
{ fullName:"Gaspap, Stanly", defaultStatus:"Present" },
{ fullName:"Guizon, Nicole", defaultStatus:"Present" },
{ fullName:"Pajo, Darren", defaultStatus:"Present" },
{ fullName:"Pascua, John Louis", defaultStatus:"Present" },
{ fullName:"Mangaliman", defaultStatus:"Present" },
{ fullName:"Nido, Brianna", defaultStatus:"Present" }
];

let attendanceStatus = members.map(m => m.defaultStatus);
let attendancePhotos = members.map(() => "");
let currentLoggedInUser = null;
let pieChart = null;

const memberSelect = document.getElementById("memberSelect");
const loginContainer = document.getElementById("loginContainer");
const dashboardApp = document.getElementById("dashboardApp");
const analyticsModal = document.getElementById("analyticsModal");
const loginError = document.getElementById("loginError");

function populateMemberSelect(){
memberSelect.innerHTML = '<option value="">Choose member</option>';
members.forEach((member,index)=>{
const option = document.createElement("option");
option.value = index;
option.textContent = member.fullName;
memberSelect.appendChild(option);
});
}

function getAttendanceCounts(){
let present = 0, absent = 0, late = 0;
attendanceStatus.forEach(status=>{
if(status === "Present") present++;
if(status === "Absent") absent++;
if(status === "Late") late++;
});
return { present, absent, late, total: members.length };
}

function updateStats(){
const counts = getAttendanceCounts();
document.getElementById("presentCount").innerText = counts.present;
document.getElementById("absentCount").innerText = counts.absent;
document.getElementById("lateCount").innerText = counts.late;
document.getElementById("totalMembers").innerText = counts.total;
document.getElementById("presentProgress").style.width = Math.round((counts.present / counts.total) * 100) + "%";
}

function updatePieChart(){
const counts = getAttendanceCounts();
const ctx = document.getElementById('attendancePieChart').getContext('2d');
if(pieChart){
pieChart.data.datasets[0].data = [counts.present, counts.late, counts.absent];
pieChart.update('none');
return;
}
pieChart = new Chart(ctx, {
type: 'doughnut',
data: {
labels: ['Present', 'Late', 'Absent'],
datasets: [{
data: [counts.present, counts.late, counts.absent],
backgroundColor: ['#10b981','#f59e0b','#ef4444'],
borderWidth: 0,
hoverOffset: 8
}]
},
options: {
responsive: true,
maintainAspectRatio: false,
plugins: {
legend: {
position: 'bottom',
labels: { padding: 12, font: { size: 11 } }
}
},
cutout: '65%'
}
});
}

function updateHealthBar(){
const counts = getAttendanceCounts();
const healthPercent = Math.round(((counts.present + (counts.late * 0.5)) / counts.total) * 100);
const healthFill = document.getElementById('healthFill');
const healthLabel = document.getElementById('healthLabel');
const healthDescription = document.getElementById('healthDescription');
healthFill.style.width = healthPercent + '%';
healthFill.innerText = healthPercent + '%';
healthFill.className = 'health-fill';
if(healthPercent >= 90){
healthFill.classList.add('excellent');
healthLabel.innerText = 'Excellent';
healthLabel.style.color = '#10b981';
healthDescription.innerText = 'Outstanding!';
} else if(healthPercent >= 75){
healthFill.classList.add('good');
healthLabel.innerText = 'Good';
healthLabel.style.color = '#6ee7b7';
healthDescription.innerText = 'Great work!';
} else if(healthPercent >= 50){
healthFill.classList.add('warning');
healthLabel.innerText = 'Fair';
healthLabel.style.color = '#f59e0b';
healthDescription.innerText = 'Room to improve';
} else {
healthFill.classList.add('danger');
healthLabel.innerText = 'Poor';
healthLabel.style.color = '#ef4444';
healthDescription.innerText = 'Needs attention';
}
}

function updateAnalyticsSummary(){
const counts = getAttendanceCounts();
const rate = Math.round((counts.present / counts.total) * 100);
document.getElementById('summaryPresent').innerText = counts.present;
document.getElementById('summaryLate').innerText = counts.late;
document.getElementById('summaryAbsent').innerText = counts.absent;
document.getElementById('summaryRate').innerText = rate + '%';
}

function openAnalyticsModal(){
analyticsModal.classList.add('active');
document.body.style.overflow = 'hidden';
updatePieChart();
updateHealthBar();
updateAnalyticsSummary();
}

function closeAnalyticsModal(){
analyticsModal.classList.remove('active');
document.body.style.overflow = 'auto';
}

function updatePhotoSection(photoCell, index, status) {
photoCell.innerHTML = '';
if (status === 'Absent') {
const noPhotoDiv = document.createElement('div');
noPhotoDiv.className = 'no-photo-needed';
noPhotoDiv.innerHTML = '<i class="fas fa-check-circle"></i>No photo';
photoCell.appendChild(noPhotoDiv);
} else {
const input = document.createElement("input");
input.type = "file"; input.accept = "image/*"; input.capture = "environment";
input.className = "hidden-input"; input.id = "photoInput" + index;

const button = document.createElement("button");
button.className = "photo-btn";
button.innerHTML = attendancePhotos[index] ? '<i class="fas fa-redo"></i>Retake' : '<i class="fas fa-camera"></i>Capture';
button.onclick = () => input.click();

const preview = document.createElement("img");
preview.className = "photo-preview";
if(attendancePhotos[index]){ preview.src = attendancePhotos[index]; preview.style.display = "block"; }

input.addEventListener("change",(e)=>{
const file = e.target.files[0];
if(file){
const reader = new FileReader();
reader.onload = (event)=>{
attendancePhotos[index] = event.target.result;
preview.src = event.target.result;
preview.style.display = "block";
button.innerHTML = '<i class="fas fa-redo"></i>Retake';
};
reader.readAsDataURL(file);
}
});

photoCell.appendChild(button);
photoCell.appendChild(input);
photoCell.appendChild(preview);
}
}

function renderAttendanceTable(){
const tbody = document.getElementById("tableBody");
tbody.innerHTML = "";
members.forEach((member,index)=>{
const row = tbody.insertRow();
row.insertCell(0).innerHTML = member.fullName;

const statusCell = row.insertCell(1);
const select = document.createElement("select");
select.className = "status-select";
["Present","Absent","Late"].forEach(status=>{
const option = document.createElement("option");
option.value = status;
option.textContent = status;
if(status === attendanceStatus[index]) option.selected = true;
select.appendChild(option);
});
select.addEventListener("change",(e)=>{
attendanceStatus[index] = e.target.value;
updateStats();
updatePhotoSection(row.cells[2], index, e.target.value);
});
statusCell.appendChild(select);

const photoCell = row.insertCell(2);
updatePhotoSection(photoCell, index, attendanceStatus[index]);
});
updateStats();
}

function exportReport(){
const counts = getAttendanceCounts();
let report = "ATTENDANCE REPORT - APR 2026\n================================\n\n";
report += `Total: ${counts.total} | Present: ${counts.present} | Late: ${counts.late} | Absent: ${counts.absent}\n\n`;
members.forEach((member, index) => {
report += `${member.fullName}: ${attendanceStatus[index]}${attendancePhotos[index] ? ' ✓' : ''}\n`;
});
const blob = new Blob([report], { type: 'text/plain' });
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url; a.download = 'attendance.txt'; a.click();
URL.revokeObjectURL(url);
}

function handleLogin(){
const selected = memberSelect.value;
const password = document.getElementById("loginPassword").value;
if(selected === "") { loginError.innerText = "Select member"; return; }
if(password !== "demo") { loginError.innerText = "Wrong passcode"; return; }
loginError.innerText = "";
currentLoggedInUser = parseInt(selected);
document.getElementById("profileName").innerText = members[selected].fullName;
loginContainer.style.display = "none";
dashboardApp.style.display = "block";
renderAttendanceTable();
}

// Events
document.getElementById("doLoginBtn").addEventListener("click",handleLogin);
document.getElementById("logoutButton").addEventListener("click",()=>{
dashboardApp.style.display = "none";
loginContainer.style.display = "block";
memberSelect.value = ""; document.getElementById("loginPassword").value = "demo";
loginError.innerText = "";
});
document.getElementById("analyticsBtn").addEventListener("click", openAnalyticsModal);
document.getElementById("closeModal").addEventListener("click", closeAnalyticsModal);
document.getElementById("exportBtn").addEventListener("click", exportReport);
analyticsModal.addEventListener("click", (e) => { if(e.target === analyticsModal) closeAnalyticsModal(); });
document.addEventListener("keydown", (e) => { if(e.key === "Escape" && analyticsModal.classList.contains("active")) closeAnalyticsModal(); });

populateMemberSelect();
</script>
