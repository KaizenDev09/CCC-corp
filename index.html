<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Attendance Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(145deg,#eef2f9 0%,#d9e1ec 100%);
font-family:'Inter',sans-serif;
padding:2rem 1.5rem;
min-height:100vh;
color:#1a2634;
}

.login-container{
max-width:500px;
margin:5vh auto;
background:white;
border-radius:2rem;
box-shadow:0 30px 50px rgba(0,0,0,0.2);
overflow:hidden;
border:1px solid rgba(255,255,255,0.5);
}

.login-header{
background:#1e3a5f;
padding:1.8rem 2rem;
text-align:center;
color:white;
}

.login-header i{
font-size:3rem;
margin-bottom:0.5rem;
}

.login-form{
padding:2rem;
}

.form-group{
margin-bottom:1.4rem;
}

.form-group label{
display:block;
font-weight:600;
margin-bottom:0.5rem;
color:#2c5a7a;
}

.form-group select,
.form-group input{
width:100%;
padding:0.9rem 1rem;
border-radius:1.2rem;
border:1.5px solid #e0edf5;
font-family:'Inter',sans-serif;
background:#fff;
font-size:0.95rem;
}

.login-btn{
background:#1e3a5f;
color:white;
width:100%;
padding:0.9rem;
font-weight:700;
border:none;
border-radius:2rem;
font-size:1rem;
cursor:pointer;
}

.dashboard{
max-width:1400px;
margin:0 auto;
background:rgba(255,255,255,0.75);
border-radius:2rem;
box-shadow:0 25px 45px -12px rgba(0,0,0,0.25);
padding:1.8rem 2rem 2.5rem;
}

.profile-section{
display:flex;
justify-content:space-between;
align-items:center;
background:white;
border-radius:1.5rem;
padding:0.8rem 1.5rem;
margin-bottom:1.5rem;
flex-wrap:wrap;
gap:1rem;
}

.profile-info{
display:flex;
align-items:center;
gap:1rem;
}

.profile-avatar{
background:linear-gradient(135deg,#2c5a7a,#1e3a5f);
width:52px;
height:52px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:1.6rem;
}

.attendance-badge{
background:#e1f7ed;
padding:0.3rem 0.9rem;
border-radius:40px;
font-size:0.8rem;
font-weight:600;
}

.attendance-badge.absent{
background:#ffe6e5;
color:#b13e3a;
}

.attendance-badge.late{
background:#fff0db;
color:#b4621a;
}

.logout-btn{
background:#f0f4f9;
border:none;
padding:0.5rem 1.2rem;
border-radius:2rem;
cursor:pointer;
}

.header-top{
display:flex;
justify-content:space-between;
margin-bottom:1rem;
}

.title-section h1{
font-size:1.8rem;
font-weight:700;
}

.month-badge{
background:#f4f7fc;
border-radius:40px;
padding:0.3rem 1.2rem;
font-weight:600;
}

.stats-grid{
display:flex;
flex-wrap:wrap;
gap:1rem;
margin:2rem 0;
}

.report-card{
background:white;
border-radius:1.5rem;
padding:1rem 1.5rem;
flex:1;
min-width:200px;
}

.report-number{
font-size:2rem;
font-weight:800;
}

.progress-bar-bg{
background:#e2e8f0;
height:8px;
border-radius:20px;
margin-top:10px;
}

.progress-fill{
background:#2f855a;
height:100%;
width:0%;
border-radius:20px;
}

.attendance-table{
width:100%;
border-collapse:collapse;
}

.attendance-table th,
.attendance-table td{
padding:1rem;
border-bottom:1px solid #ecf3f9;
text-align:left;
vertical-align:middle;
}

.status-select{
padding:0.5rem 0.8rem;
border-radius:40px;
border:1px solid #ccd;
}

.photo-btn{
background:#1e3a5f;
color:white;
border:none;
padding:0.5rem 1rem;
border-radius:30px;
cursor:pointer;
font-size:0.85rem;
}

.photo-preview{
width:55px;
height:55px;
border-radius:12px;
object-fit:cover;
border:2px solid #dbe7f3;
display:block;
}

.hidden-input{
display:none;
}
</style>
</head>
<body>

<div id="loginContainer" class="login-container">
<div class="login-header">
<i class="fas fa-clipboard-list"></i>
<h2>ATTENDANCE MONITOR</h2>
</div>

<div class="login-form">
<div class="form-group">
<label>Select your profile</label>
<select id="memberSelect">
<option value="">-- choose member --</option>
</select>
</div>

<div class="form-group">
<label>Passcode</label>
<input type="password" id="loginPassword" value="demo">
</div>

<button id="doLoginBtn" class="login-btn">Enter Dashboard</button>
<div id="loginError"></div>
</div>
</div>

<div id="dashboardApp" style="display:none;">
<div class="dashboard">

<div class="profile-section">
<div class="profile-info">
<div class="profile-avatar">
<i class="fas fa-user"></i>
</div>
<div>
<h3 id="profileName">Member Name</h3>
<p>MAWD - 203</p>
</div>
</div>

<div style="display:flex;gap:10px;align-items:center;">
<div id="profileStatusBadge" class="attendance-badge">Present</div>
<button id="logoutButton" class="logout-btn">Logout</button>
</div>
</div>

<div class="header-top">
<div class="title-section">
<h1>ATTENDANCE MONITOR</h1>
</div>
<div class="month-badge">APRIL 2026</div>
</div>

<div class="stats-grid">
<div class="report-card">
<h3>TOTAL MEMBERS</h3>
<div class="report-number" id="totalMembers">9</div>
</div>

<div class="report-card">
<h3>PRESENT</h3>
<div class="report-number" id="presentCount">0</div>
<div class="progress-bar-bg">
<div class="progress-fill" id="presentProgress"></div>
</div>
</div>

<div class="report-card">
<h3>LATE</h3>
<div class="report-number" id="lateCount">0</div>
</div>

<div class="report-card">
<h3>ABSENT</h3>
<div class="report-number" id="absentCount">0</div>
</div>
</div>

<table class="attendance-table">
<thead>
<tr>
<th>Member Name</th>
<th>Status</th>
<th>Proof Photo</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>
</div>

<script>
const members = [
{ fullName:"Dayag, Arwil", defaultStatus:"Present" },
{ fullName:"Gacia, Aira", defaultStatus:"Present" },
{ fullName:"Fernandez, Rhian", defaultStatus:"Present" },
{ fullName:"Gaspap, Stanly", defaultStatus:"Present" },
{ fullName:"Guizon, Nicole", defaultStatus:"Present" },
{ fullName:"Pajo, Darren", defaultStatus:"Present" },
{ fullName:"Pascua, John Louis", defaultStatus:"Present" },
{ fullName:"Mangaliman", defaultStatus:"Present" },
{ fullName:"Nido, Brianna", defaultStatus:"Present" }
];

let attendanceStatus = members.map(m => m.defaultStatus);
let attendancePhotos = members.map(() => "");
let currentLoggedInUser = null;

const memberSelect = document.getElementById("memberSelect");
const loginContainer = document.getElementById("loginContainer");
const dashboardApp = document.getElementById("dashboardApp");

function populateMemberSelect(){
members.forEach((member,index)=>{
const option = document.createElement("option");
option.value = index;
option.textContent = member.fullName;
memberSelect.appendChild(option);
});
}

function getStatusClass(status){
if(status === "Present") return "present";
if(status === "Absent") return "absent";
if(status === "Late") return "late";
return "";
}

function updateStats(){
let present = 0;
let absent = 0;
let late = 0;

attendanceStatus.forEach(status=>{
if(status === "Present") present++;
if(status === "Absent") absent++;
if(status === "Late") late++;
});

document.getElementById("presentCount").innerText = present;
document.getElementById("absentCount").innerText = absent;
document.getElementById("lateCount").innerText = late;
document.getElementById("totalMembers").innerText = members.length;

const rate = Math.round((present / members.length) * 100);
document.getElementById("presentProgress").style.width = rate + "%";
}

function renderAttendanceTable(){
const tbody = document.getElementById("tableBody");
tbody.innerHTML = "";

members.forEach((member,index)=>{
const row = tbody.insertRow();

const nameCell = row.insertCell(0);
nameCell.innerHTML = member.fullName;

const statusCell = row.insertCell(1);
const select = document.createElement("select");
select.className = "status-select";

["Present","Absent","Late"].forEach(status=>{
const option = document.createElement("option");
option.value = status;
option.textContent = status;
if(status === attendanceStatus[index]) option.selected = true;
select.appendChild(option);
});

select.addEventListener("change",(e)=>{
attendanceStatus[index] = e.target.value;
updateStats();
});

statusCell.appendChild(select);

const photoCell = row.insertCell(2);

const input = document.createElement("input");
input.type = "file";
input.accept = "image/*";
input.capture = "environment";
input.className = "hidden-input";
input.id = "photoInput" + index;

const button = document.createElement("button");
button.className = "photo-btn";
button.innerText = attendancePhotos[index] ? "Retake Photo" : "Take Photo";

button.onclick = () => {
input.click();
};

const preview = document.createElement("img");
preview.className = "photo-preview";

if(attendancePhotos[index]){
preview.src = attendancePhotos[index];
} else {
preview.style.display = "none";
}

input.addEventListener("change",(e)=>{
const file = e.target.files[0];
if(file){
const reader = new FileReader();
reader.onload = function(event){
attendancePhotos[index] = event.target.result;
preview.src = event.target.result;
preview.style.display = "block";
button.innerText = "Retake Photo";
};
reader.readAsDataURL(file);
}
});

photoCell.appendChild(button);
photoCell.appendChild(input);
photoCell.appendChild(preview);
});

updateStats();
}

function handleLogin(){
const selected = memberSelect.value;
if(selected === "") return;

currentLoggedInUser = parseInt(selected);
document.getElementById("profileName").innerText = members[selected].fullName;

loginContainer.style.display = "none";
dashboardApp.style.display = "block";

renderAttendanceTable();
}

document.getElementById("doLoginBtn").addEventListener("click",handleLogin);

document.getElementById("logoutButton").addEventListener("click",()=>{
dashboardApp.style.display = "none";
loginContainer.style.display = "block";
});

populateMemberSelect();
</script>

</body>
</html>
